  <path d="M171 641 C176 614 206 608 227 624 C247 641 232 678 202 682 C179 685 165 665 171 641 Z" fill="#F1B984" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

  <!-- Neck -->
  <path d="M384 342 C385 373 381 396 360 410 C391 432 433 414 440 379 C417 374 397 360 384 342 Z" fill="#F1B984" stroke="#111" stroke-width="15" stroke-linejoin="round"/>

  <!-- Head -->
  <path d="M325 215 C404 158 525 195 550 286 C575 377 513 455 416 454 C332 453 265 395 261 317 C259 275 282 245 325 215 Z" fill="#F1B984" stroke="#111" stroke-width="18" stroke-linejoin="round"/>
  <path d="M269 320 C236 305 233 253 270 241 C310 228 330 273 309 304" fill="#F1B984" stroke="#111" stroke-width="16" stroke-linejoin="round"/>

  <!-- Hair -->
  <path d="M287 240 C308 174 390 142 458 164 C442 181 432 194 421 212 C471 184 534 194 574 234 C546 240 518 246 493 253 C529 269 554 293 567 327 C527 314 487 299 448 286 C428 334 380 343 348 315 C320 349 283 344 259 317 C257 288 264 263 287 240 Z" fill="#9A6337" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

  <!-- Face -->
  <circle cx="430" cy="315" r="9" fill="#111"/>
  <circle cx="493" cy="316" r="9" fill="#111"/>
  <path class="line-thin" d="M460 336 C479 350 474 370 448 369"/>
  <path class="line-thin" d="M396 381 C431 414 482 414 514 378"/>

