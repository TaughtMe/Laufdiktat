  <path d="M583 573 C606 552 641 567 641 599 C641 627 606 642 585 623 C569 609 567 589 583 573 Z" fill="#F1B984" stroke="#111" stroke-width="17" stroke-linejoin="round"/>

  <!-- Small note -->
  <g transform="rotate(-8 656 574)">
    <rect x="635" y="507" width="95" height="138" rx="8" fill="#FFFFFF" stroke="#111" stroke-width="15"/>
    <path class="textline" d="M662 548 L710 548"/>
    <path class="textline" d="M662 582 L714 582"/>
    <path class="textline" d="M662 616 L699 616"/>
  </g>

  <!-- Station -->
  <path d="M760 806 L760 597" class="line"/>
  <path d="M681 806 L842 806 L872 850 L650 850 Z" fill="#A8794F" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

  <g transform="rotate(2 761 430)">
    <rect x="652" y="268" width="274" height="300" rx="24" fill="#D6B78F" stroke="#111" stroke-width="18"/>
    <rect x="704" y="318" width="141" height="182" rx="11" fill="#FFFFFF" stroke="#111" stroke-width="15"/>
    <rect x="762" y="255" width="62" height="73" rx="14" fill="#B7B7B7" stroke="#111" stroke-width="15"/>
    <path class="textline" d="M736 368 L815 368"/>
    <path class="textline" d="M735 410 L820 410"/>
    <path class="textline" d="M735 452 L804 452"/>
  </g>

  <!-- Pencil -->
  <g transform="rotate(27 879 465)">
    <path d="M875 344 L918 344 L918 556 L897 604 L875 556 Z" fill="#F7CB45" stroke="#111" stroke-width="15" stroke-linejoin="round"/>
    <path d="M875 556 L918 556 L897 604 Z" fill="#F1B984" stroke="#111" stroke-width="13" stroke-linejoin="round"/>
    <path d="M890 594 L904 594" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
