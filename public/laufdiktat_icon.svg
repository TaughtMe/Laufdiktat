<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Laufdiktat App Icon</title>
  <desc id="desc">Handgezeichnetes Icon: laufendes Schulkind mit Zettel neben einer Basisstation mit Diktatblatt</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .line {
        fill: none;
        stroke: #111;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .line-thin {
        fill: none;
        stroke: #111;
        stroke-width: 11;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .textline {
        fill: none;
        stroke: #111;
        stroke-width: 8;
        stroke-linecap: round;
      }
      .dash {
        fill: none;
        stroke: #111;
        stroke-width: 9;
        stroke-linecap: round;
        stroke-dasharray: 36 34;
      }
    </style>
  </defs>

  <!-- App background -->
  <rect x="52" y="52" width="920" height="920" rx="210" fill="#FDFCF8" filter="url(#softShadow)"/>
  <rect x="52" y="52" width="920" height="920" rx="210" fill="none" stroke="#12CFC3" stroke-width="18"/>

  <!-- Motion lines -->
  <path class="line-thin" d="M128 660 C82 676 68 704 48 735"/>
  <path class="line-thin" d="M116 748 C70 760 48 786 30 820"/>
  <path class="dash" d="M145 880 C270 895 397 880 514 890 C590 896 690 892 780 878"/>

  <!-- Child legs behind -->
  <path d="M321 624 C278 677 250 735 208 796 L277 821 C323 770 354 715 394 660 Z" fill="#4E90BF" stroke="#111" stroke-width="18" stroke-linejoin="round"/>
  <path class="line" d="M208 796 C174 813 150 838 149 876"/>
  <path d="M142 861 C179 840 237 852 272 886 C239 919 175 930 141 902 C126 891 126 873 142 861 Z" fill="#fff" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

  <!-- Child body -->
  <path d="M281 398 C353 360 456 395 485 471 C506 528 480 601 421 635 C360 670 268 648 235 586 C201 520 221 433 281 398 Z" fill="#86B96B" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

