  <path d="M409 629 C476 663 540 703 594 746 L548 802 C496 775 425 732 372 698 Z" fill="#4E90BF" stroke="#111" stroke-width="18" stroke-linejoin="round"/>
  <path d="M535 792 C576 769 634 782 665 823 C632 857 568 864 536 836 C519 821 519 803 535 792 Z" fill="#fff" stroke="#111" stroke-width="18" stroke-linejoin="round"/>

